<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading... - Hanqiu Li Cai</title>
  <link rel="stylesheet" href="../css/style.css">
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <!-- zero-md -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@3?register"></script>
</head>
<body>

<div class="page">
<article id="post">
  <p class="muted" id="date"></p>
  <h1 id="title">Loading...</h1>
  <zero-md id="content">
    <template data-append>
      <style>
        .markdown-body {
          font-family: 'Inter', -apple-system, sans-serif;
          font-size: 0.95rem;
          line-height: 1.7;
          color: #ffffff;
          background: transparent;
        }
        .markdown-body h1 { display: none; }
        .markdown-body h2 { font-size: 1rem; font-weight: 500; margin: 2rem 0 1rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.02em; font-size: 0.75rem; }
        .markdown-body a { color: #ffffff; text-decoration: underline; text-underline-offset: 2px; text-decoration-color: rgba(255,255,255,0.3); }
        .markdown-body a:hover { text-decoration-color: rgba(255,255,255,0.85); }
        .markdown-body blockquote { border-left: 2px solid rgba(255,255,255,0.1); padding-left: 1rem; color: rgba(255,255,255,0.5); font-style: italic; }
        .markdown-body code { background: rgba(255,255,255,0.08); padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.875em; }
        .markdown-body ul, .markdown-body ol { margin-left: 1.25rem; margin-bottom: 1rem; }
        .markdown-body li { margin-bottom: 0.25rem; }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body img { max-width: 100%; border-radius: 4px; margin: 1rem 0; }
        .markdown-body iframe { max-width: 100%; margin: 1rem 0; }
      </style>
    </template>
  </zero-md>
</article>

<p class="back"><a href="../thoughts.html">← back</a></p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const post = params.get('p');
  
  if (post) {
    // Load the markdown file
    document.getElementById('content').setAttribute('src', `posts/${post}.md`);
    
    // Fetch frontmatter (title, date) from the md file
    fetch(`posts/${post}.md`)
      .then(r => r.text())
      .then(text => {
        // Extract title from first # heading
        const titleMatch = text.match(/^#\s+(.+)$/m);
        if (titleMatch) {
          document.getElementById('title').textContent = titleMatch[1];
          document.title = titleMatch[1] + ' - Hanqiu Li Cai';
        }
        
        // Extract date from <!-- date: YYYY-MM-DD --> comment
        const dateMatch = text.match(/<!--\s*date:\s*(\d{4}-\d{2}-\d{2})\s*-->/);
        if (dateMatch) {
          const date = new Date(dateMatch[1]);
          document.getElementById('date').textContent = date.toLocaleDateString('en-US', {
            year: 'numeric', month: 'long', day: 'numeric'
          });
        }
      });
    
    // Render KaTeX after markdown loads
    document.getElementById('content').addEventListener('zero-md-rendered', () => {
      const md = document.getElementById('content').shadowRoot.querySelector('.markdown-body');
      if (md && window.renderMathInElement) {
        renderMathInElement(md, {
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false}
          ],
          throwOnError: false
        });
      }
    });
  } else {
    document.getElementById('title').textContent = 'Post not found';
  }
</script>

</body>
</html>
