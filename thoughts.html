<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thoughts - Hanqiu Li Cai</title>
  <meta name="description" content="Personal thoughts by Hanqiu Li Cai">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
<h1>Thoughts</h1>

<p>
  Welcome to my little backyard, where I share random reflections just about life or any other learnings that are not related to technical stuff.
</p>

<ul class="post-list" id="posts"></ul>

<p class="back"><a href="/">← back</a></p>
</div>

<script>
  fetch('thoughts/posts.json?t=' + Date.now())
    .then(r => r.json())
    .then(posts => {
      const list = document.getElementById('posts');
      posts
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .forEach(post => {
          const date = new Date(post.date);
          const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          list.innerHTML += `
            <li>
              <span class="date">${dateStr}</span>
              <a href="thoughts/post.html?p=${post.slug}">${post.title}</a>
            </li>
          `;
        });
    });
</script>

</body>
</html>
